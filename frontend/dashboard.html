<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Scrolls & Tomes - Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter&display=swap" rel="stylesheet">

  <style>
    /* =========================================================================
       GLOBAL & LAYOUT
       ========================================================================= */
    html, body { height: 100%; margin: 0; }
    body { background-color: #0b0f1a; color: #e6ecff; font-family: 'Inter', sans-serif; }
    .container-fluid, .row { height: 100%; }
    .row { display: flex; flex-wrap: nowrap; }
    .main { height: 100%; display: flex; flex-direction: column; padding: 0; flex-grow: 1; min-width: 0; }
    .content { flex-grow: 1; padding: 20px; display: flex; min-height: 0; min-width: 0; }
    
    /* =========================================================================
       SIDEBAR
       ========================================================================= */
    .sidebar { height: 100%; background-color: #141a2e; padding: 20px; border-right: 1px solid #5da9ff; display: flex; flex-direction: column; transition: width 0.3s ease; width: 260px; flex-shrink: 0; }
    .sidebar.collapsed { width: 80px; padding: 20px 10px; }
    .sidebar h2 { font-family: 'Cinzel', serif; color: #5da9ff; font-size: 20px; transition: opacity 0.2s; }
    .sidebar.collapsed h2 { opacity: 0; }
    .sidebar.collapsed .nav-btn { font-size: 0; padding: 12px; }
    .nav-section { margin-top: 20px; flex-grow: 1; }

    /* =========================================================================
       BUTTONS & NAV
       ========================================================================= */
    .nav-btn { width: 100%; margin-bottom: 10px; background: none; border: 1px solid #5da9ff; color: #e6ecff; padding: 10px; transition: all 0.2s ease; white-space: nowrap; }
    .nav-btn:hover { background-color: #1f2a4a; }
    .nav-btn.active { background-color: #5da9ff; color: #0b0f1a; font-weight: bold; }
    .divider { border-top: 1px solid rgba(93, 169, 255, 0.3); margin: 10px 0; }
    .toggle-btn { background: none; border: 1px solid #5da9ff; color: #5da9ff; padding: 5px 10px; cursor: pointer; }
    .btn-primary { background-color: #5da9ff; border: none; color: #0b0f1a; }
    .btn-accent { background-color: #9b5cff; border: none; }

    /* =========================================================================
       TOP BAR & USER INFO
       ========================================================================= */
    .topbar { height: 60px; background-color: #0b0f1a; border-bottom: none; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background-color: #5da9ff; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #0b0f1a; }
    .user-text { text-align: right; }
    .user-name { font-size: 14px; font-weight: bold; }
    .user-guild { font-size: 12px; opacity: 0.7; }

    /* =========================================================================
       CHAT INTERFACE
       ========================================================================= */
    .card-custom { background-color: #141a2e; border: 1px solid #5da9ff; border-radius: 12px; padding: 20px; box-shadow: 0 0 15px rgba(93, 169, 255, 0.2); display: flex; flex-direction: column; flex-grow: 1; min-height: 0; }
    .section-title { font-family: 'Cinzel', serif; font-size: 24px; color: #5da9ff; margin-bottom: 10px; }
    .chat-box { flex-grow: 1; overflow-y: auto; background-color: #0a0e1a; padding: 15px; border-radius: 8px; margin-bottom: 15px; min-height: 0; }
    .input-row { display: flex; gap: 10px; }
    .input-row input { flex: 1; }
    input, select, textarea { background-color: #1a2238 !important; color: #e6ecff !important; border: 1px solid #5da9ff !important; }

    /* =========================================================================
       MESSAGES & REACTIONS
       ========================================================================= */
    .msg-wrapper { position: relative; padding: 8px; border-radius: 5px; margin-bottom: 5px; }
    .msg-wrapper:hover { background-color: #1f2a4a; }
    .msg-controls { position: absolute; right: 10px; top: 5px; opacity: 0; transition: opacity 0.2s; background: #0b0f1a; border: 1px solid #5da9ff; border-radius: 4px; padding: 2px 5px; display: flex; gap: 5px; }
    .msg-wrapper:hover .msg-controls { opacity: 1; }
    .reaction-btn { background: none; border: none; cursor: pointer; font-size: 14px; }
    .tooltip-container { position: relative; display: inline-block; cursor: pointer; }
    .tooltip-container .tooltip-text { visibility: hidden; background-color: #1a2238; color: #fff; padding: 6px 10px; border-radius: 6px; border: 1px solid #5da9ff; position: absolute; z-index: 9999; top: 130%; left: 0; transform: none; white-space: nowrap; opacity: 0; transition: opacity 0.3s; font-size: 11px; pointer-events: none; }
    .tooltip-container:hover .tooltip-text { visibility: visible; opacity: 1; }

    /* =========================================================================
       CHAT DROPDOWN & ACTIVE USERS
       ========================================================================= */
    .chat-dropdown { position: relative; }
    .chat-dropbtn { background: none; border: 1px solid #5da9ff; color: #5da9ff; border-radius: 6px; padding: 2px 8px; cursor: pointer; font-size: 14px; }
    .chat-menu { display: none; position: absolute; right: 0; top: 28px; background: #141a2e; border: 1px solid #5da9ff; border-radius: 8px; overflow: hidden; z-index: 1000; min-width: 140px; }
    .chat-menu div { padding: 8px 10px; cursor: pointer; font-size: 13px; }
    .chat-menu div:hover { background: #1f2a4a; }
    .active-btn { background-color: #1a2238; color: #e6ecff; border: 1px solid #5da9ff; border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    .active-btn:hover { background-color: #222c4a; }
    .chat-content { display: flex; flex-grow: 1; gap: 10px; min-height: 0; }
    .chat-messages { flex: 1; display: flex; flex-direction: column; min-width: 0; transition: all 0.3s ease; }
    .chat-users { width: 0; overflow: hidden; transition: width 0.3s ease; background-color: #0a0e1a; border-left: 1px solid #5da9ff; border-radius: 8px; padding: 0; }
    .chat-users.open { width: 220px; padding: 10px; }
    #activeUsersList div { padding: 6px; border-bottom: 1px solid rgba(93, 169, 255, 0.2); font-size: 13px; }

        /* =========================================================================
        QUESTION FILTERS
       ========================================================================= */

    .filter-box {
      border: 1px solid #5da9ff;
      padding: 10px;
      border-radius: 8px;
      min-width: 140px;
      background-color: #1a2238;
    }

    /* ===== FILTER UI REDESIGN ===== */

    .filter-group {
      background: #141a2e;
      border: 1px solid #5da9ff;
      border-radius: 10px;
      padding: 8px;
    }

    .filter-title {
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 6px;
    }

    .filter-options {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filter-pill {
      border: 1px solid #5da9ff;
      background: transparent;
      color: #e6ecff;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 11px;
      cursor: pointer;
      transition: 0.2s;
      display: block;
      width: 100%;
    }

    .filter-pill:hover {
      background: #1f2a4a;
    }

    .selected-filters {
      background: #0a0e1a;
      border: 1px solid #5da9ff;
      border-radius: 10px;
      padding: 10px;

      display: flex;
      flex-direction: column;
      height: 100%; 
      overflow: hidden;  
    }

    .selected-filters::-webkit-scrollbar {
      width: 6px;
    }

    .selected-filters::-webkit-scrollbar-thumb {
      background: #5da9ff;
      border-radius: 10px;
    }

    .selected-filters::-webkit-scrollbar-track {
      background: transparent;
    }

    /* INCLUDE */
    .filter-pill.include {
      background: #5da9ff;
      color: #0b0f1a;
    }

    .filter-pill {
      display: block;
      width: 100%;
      text-align: left;
      white-space: normal;
      position: relative;
    }

    /* EXCLUDE */
    .filter-pill.exclude {
      background: #ff5d5d;
      color: white;
    }

    .filter-group,
    .selected-filters {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .filter-options {
      flex: 1;
    }

    .filter-options {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: stretch; /* force same width */
  }

  .filter-pill {
    width: 100%;        /* FULL width */
    text-align: center; /* optional: looks nicer */
  }

    /* ===== QUESTION LIST SCROLL ===== */

    .question-list {
      flex: 1;
      overflow-y: auto;
      background: #0a0e1a;
      border-radius: 8px;
      padding: 10px;
      max-height: 300px;
    }

    .filter-chip {
      display: inline-block;
      margin: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      white-space: nowrap;
    }

    .filter-chip.include {
      background: #5da9ff;
      color: #0b0f1a;
    }

    .filter-chip.exclude {
      background: #ff5d5d;
      color: white;
    }

    .filter-chip.exclude {
      background: #ff5d5d;
      color: white;
    }
  </style>
</head>

<body>

  <div class="container-fluid">
    <div class="row">

      <div id="sidebar" class="sidebar">
        <h2>Scrolls & Tomes</h2>
        <div class="nav-section">
          <button class="nav-btn active" onclick="showSection('chat', this)">Guild Chat</button>
          <button class="nav-btn" onclick="showSection('questions', this)">Answer Questions</button>
          <button class="nav-btn" onclick="showSection('create', this)">Create Question</button>
          <button class="nav-btn" onclick="showSection('myQuestions', this)">My Questions</button>
          <button class="nav-btn" onclick="window.location.href='/leaderboard.html'">Leaderboard</button>
        </div>
        <div class="divider"></div>
        <button class="nav-btn" onclick="logout()">Logout</button>
      </div>

      <div class="col main">
        <div class="topbar">
          <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
          <div class="user-info">
            <div class="user-text">
              <div class="user-name" id="usernameDisplay"></div>
              <div class="user-guild" id="guildDisplay"></div>
            </div>
            <div class="avatar" id="avatar"></div>
          </div>
        </div>

        <div class="content">
          <div id="chatSection" style="display:flex; gap:10px; width:100%; height:100%;">
            <div id="chatMain" class="card-custom" style="flex:1; min-width:0;">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <div class="section-title" id="chatTitle">World Chat</div>
                <div style="display:flex; align-items:center; gap:10px;">
                  <button class="active-btn" onclick="toggleActivePanel()">👥 <span id="activeCount">0</span></button>
                  <div class="chat-dropdown">
                    <button class="chat-dropbtn" onclick="toggleRoomMenu()">▾</button>
                    <div id="roomMenu" class="chat-menu">
                      <div onclick="selectRoom('global')">🌍 World</div>
                      <div onclick="selectRoom('guild')">🏰 Guild</div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="chat-content">
                <div class="chat-messages">
                  <div class="chat-box" id="chatBox">
                    <p style="opacity:.6;">💬 Guild chat will appear here</p>
                  </div>
                </div>
                <div id="activeUsersPanel" class="chat-users">
                  <div class="section-title" style="font-size:16px;">Active Users</div>
                  <div id="activeUsersList"></div>
                </div>
              </div>
              <div class="input-row">
                <textarea id="chatInput" class="form-control" placeholder="Type a message..." rows="2"></textarea>
                <button class="btn btn-primary" onclick="sendMessage()">Send</button>
              </div>
            </div>
          </div>

          <div id="questionsSection" class="card-custom" style="display:none;">
            
            <div style="display:flex; gap:16px; margin-bottom:15px; align-items:stretch;">

                <!-- CATEGORY -->
                <div class="filter-group" id="categoryFilter" style="flex:0.8;">
                  <div class="filter-title">Category</div>
                  <div class="filter-options" style="flex-direction:column;">
                    <button class="filter-pill" data-value="math">Math</button>
                    <button class="filter-pill" data-value="engineering">Engineering</button>
                    <button class="filter-pill" data-value="business">Business</button>
                    <button class="filter-pill" data-value="arts">Arts</button>
                    <button class="filter-pill" data-value="medicine">Medicine</button>
                  </div>
                </div>

                <!-- DIFFICULTY -->
                <div class="filter-group" id="difficultyFilter" style="flex:0.8;">
                  <div class="filter-title">Difficulty</div>
                  <div class="filter-options" style="flex-direction:column;">
                    <button class="filter-pill" data-value="easy">Easy</button>
                    <button class="filter-pill" data-value="medium">Medium</button>
                    <button class="filter-pill" data-value="hard">Hard</button>
                  </div>
                </div>

                <!-- GUILD -->
                <div class="filter-group" id="guildFilter" style="flex:0.8;">
                  <div class="filter-title">Guild</div>
                  <div class="filter-options" style="flex-direction:column;">
                    <button class="filter-pill" data-value="engineering">Mage</button>
                    <button class="filter-pill" data-value="business">Merchant</button>
                    <button class="filter-pill" data-value="arts">Artisan</button>
                    <button class="filter-pill" data-value="medicine">Healer</button>
                  </div>
                </div>

              <!-- RIGHT COLUMN (SELECTED FILTERS) -->
              <div class="selected-filters" style="flex:2;">
                <div class="filter-title">Selected Filters</div>

                <div style="margin-bottom:10px;">
                  <strong style="color:#5da9ff;">Include:</strong>
                  <div id="includeFilters" style="display:flex; flex-wrap:wrap;"></div>
                </div>

                <div>
                  <strong style="color:#ff5d5d;">Exclude:</strong>
                  <div id="excludeFilters" style="display:flex; flex-wrap:wrap;"></div>
                </div>
              </div>

            </div>

            <div style="margin-bottom:10px; display:flex; gap:15px; flex-wrap:wrap;">
              <label>
                <input type="checkbox" id="excludeAnswered">
                Hide already answered
              </label>
            </div>

            <div class="section-title">Answer Questions</div>

            <div id="questionList" class="question-list">
              <p style="opacity:.6;">Click search to load questions</p>
            </div>

            <button class="btn btn-primary mt-2" onclick="startQuestions()">
              Search Questions
            </button>

            </div>

          <div id="answerSingleSection" class="card-custom" style="display:none;">
            <div class="section-title">Answer Question</div>

            <p id="singleQuestionText"></p>

            <input type="text" id="singleAnswerInput" class="form-control" placeholder="Type your answer...">

            <button class="btn btn-accent mt-2" onclick="submitSingleAnswer()">Submit Answer</button>
            <button class="btn btn-secondary mt-2" onclick="backToSearch()">⬅ Back to Questions</button>

            <p id="singleResultText"></p>
          </div>

          <div id="createSection" class="card-custom" style="display:none;">
            <div class="section-title">Create Question</div>
            <label style="margin-bottom:4px; opacity:0.8;">Question</label>
            <input type="text" id="newQuestion" class="form-control mb-2" placeholder="Enter the question">
            <label style="margin-bottom:4px; opacity:0.8;">Answer</label>
            <input type="text" id="newAnswer" class="form-control mb-2" placeholder="Enter the correct answer">
            <select id="newDifficulty" class="form-control mb-2">
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
            <select id="newCategory" class="form-control mb-2">
              <option value="math">Math</option>
              <option value="engineering">Engineering</option>
              <option value="business">Business</option>
              <option value="arts">Arts</option>
              <option value="medicine">Medicine</option>
            </select>
            <button class="btn btn-primary" onclick="submitQuestion()">Submit</button>
            <p id="createResult"></p>
          </div>

          <div id="myQuestionsSection" class="card-custom" style="display:none;">
          <div class="section-title">My Questions</div>
          <div id="myQuestionsList"></div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script>
    /* =========================================================================
       USER DATA & AUTHENTICATION
       ========================================================================= */
    const username = localStorage.getItem("username");
    const major = localStorage.getItem("major");

    if (!username || !major) {
      window.location.href = "/login.html";
    }

    function getGuild(major) {
      if (major === "engineering") return "Mage Guild";
      if (major === "business") return "Merchant Guild";
      if (major === "arts") return "Artisan Guild";
      if (major === "medicine") return "Healer Guild";
      return "Unknown Guild";
    }

    function getGuildRoom() {
      return `guild_${major}`;
    }

    /* HEADER UI SETUP */
    document.getElementById("usernameDisplay").innerText = username;
    document.getElementById("guildDisplay").innerText = getGuild(major);
    document.getElementById("avatar").innerText = username.charAt(0).toUpperCase();

    const guildName = getGuild(major);
    let currentRoom = "global";
    let currentQuestionId = null;

    /* =========================================================================
       UI NAVIGATION & TOGGLES
       ========================================================================= */
    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("collapsed");
    }

    function showSection(section, btn) {
      document.getElementById("chatSection").style.display = "none";
      document.getElementById("questionsSection").style.display = "none";
      document.getElementById("createSection").style.display = "none";
      document.getElementById("myQuestionsSection").style.display = "none";
      document.getElementById("answerSingleSection").style.display = "none";

      document.getElementById(section + "Section").style.display = "flex";

      if (section === "myQuestions") loadMyQuestions();

      document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
      if (btn) btn.classList.add("active");
    }

    function toggleRoomMenu() {
      const menu = document.getElementById("roomMenu");
      menu.style.display = menu.style.display === "block" ? "none" : "block";
    }

    function toggleActivePanel() {
      const panel = document.getElementById("activeUsersPanel");
      panel.classList.toggle("open");
    }

    function logout() {
      localStorage.clear();
      window.location.href = "/index.html";
    }

    /* =========================================================================
       CHAT LOGIC
       ========================================================================= */
    async function sendMessage() {
      const input = document.getElementById("chatInput");
      const message = input.value.trim();
      if (!message) return;
      await fetch("/send-message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, room: currentRoom, message })
      });
      input.value = "";
      loadMessages();
    }

    async function loadMessages() {
      const res = await fetch(`/messages/${currentRoom}`);
      const messages = await res.json();
      const chatBox = document.getElementById("chatBox");
      const isNearBottom = chatBox.scrollTop + chatBox.clientHeight >= chatBox.scrollHeight - 50;
      chatBox.innerHTML = "";

      messages.forEach(msg => {
        const wrapper = document.createElement("div");
        wrapper.className = "msg-wrapper";

        let reactionsHtml = "";
        if (msg.reactionData) {
          for (const [emoji, data] of Object.entries(msg.reactionData)) {
            const userList = data.users.join(", ");
            reactionsHtml += `
              <div class="tooltip-container">
                  <button class="reaction-btn" style="margin-right:8px; border:1px solid #333; padding:2px 5px; border-radius:4px" onclick="toggleReaction(${msg.id}, '${emoji}')">
                      ${emoji} ${data.count}
                  </button>
                  <span class="tooltip-text">Reacted by: ${userList}</span>
              </div>
            `;
          }
        }

        let controlsHtml = `
          <div class="msg-controls">
            <button class="reaction-btn" onclick="toggleReaction(${msg.id}, '👍')">👍</button>
            <button class="reaction-btn" onclick="toggleReaction(${msg.id}, '❤️')">❤️</button>
            <button class="reaction-btn" onclick="toggleReaction(${msg.id}, '😂')">😂</button>
            ${msg.username === username ? `<button class="reaction-btn" onclick="deleteMessage(${msg.id})" style="color:red">❌</button>` : ''}
          </div>
        `;

        wrapper.innerHTML = `
          <div><strong>${msg.username}:</strong> ${msg.message.replace(/\n/g, "<br>")}</div>
          <div style="margin: 5px 0;">${reactionsHtml}</div>
          ${controlsHtml}
        `;
        chatBox.appendChild(wrapper);
      });

      if (isNearBottom) chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function deleteMessage(messageId) {
      if (!confirm("Are you sure you want to delete this message?")) return;
      await fetch("/delete-message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messageId, username })
      });
      loadMessages();
    }

    async function toggleReaction(messageId, emoji) {
      await fetch("/toggle-reaction", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messageId, username, emoji })
      });
      loadMessages();
    }

    async function selectRoom(room) {
      currentRoom = room === "guild" ? getGuildRoom() : "global";
      document.getElementById("roomMenu").style.display = "none";
      await sendHeartbeat();
      loadMessages();
      updateChatTitle();
    }

    function updateChatTitle() {
      const title = document.getElementById("chatTitle");
      if (!title) return;
      if (currentRoom === "global") title.innerText = "World Chat";
      else if (currentRoom.startsWith("guild_")) title.innerText = `${getGuild(major)} Chat`;
      else title.innerText = "Chat";
    }

    /* =========================================================================
       QUESTION LOGIC
       ========================================================================= */

    document.querySelectorAll(".filter-pill").forEach(btn => {
      btn.addEventListener("click", () => {

        // cycle: none → include → exclude → none
        if (!btn.classList.contains("include") && !btn.classList.contains("exclude")) {
          btn.classList.add("include");

        } else if (btn.classList.contains("include")) {
          btn.classList.remove("include");
          btn.classList.add("exclude");

        } else {
          btn.classList.remove("exclude");
        }

        updateSelectedFiltersUI();
      });
    });

    function updateSelectedFiltersUI() {
      const includeDiv = document.getElementById("includeFilters");
      const excludeDiv = document.getElementById("excludeFilters");

      const all = document.querySelectorAll(".filter-pill");

      const include = [];
      const exclude = [];

      all.forEach(btn => {
        const text = btn.innerText;

        if (btn.classList.contains("include")) include.push(text);
        if (btn.classList.contains("exclude")) exclude.push(text);
      });

      includeDiv.innerHTML = include.map(i =>
        `<span class="filter-chip include">✓ ${i}</span>`
      ).join("");

      excludeDiv.innerHTML = exclude.map(i =>
        `<span class="filter-chip exclude">✖ ${i}</span>`
      ).join("");
    }

    async function startQuestions() {

      function getFilterValues(containerId) {
        const include = [];
        const exclude = [];

        const buttons = document.querySelectorAll(`#${containerId} .filter-pill`);

        buttons.forEach(btn => {
          const value = btn.dataset.value;

          if (btn.classList.contains("include")) include.push(value);
          if (btn.classList.contains("exclude")) exclude.push(value);
        });

        return { include, exclude };
      }

      const cat = getFilterValues("categoryFilter");
      const diff = getFilterValues("difficultyFilter");
      const guild = getFilterValues("guildFilter");

      const excludeAnswered = document.getElementById("excludeAnswered").checked;

      const res = await fetch("/questions-advanced", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          username,

          includeCategories: cat.include,
          excludeCategories: cat.exclude,

          includeDifficulties: diff.include,
          excludeDifficulties: diff.exclude,

          includeGuilds: guild.include,
          excludeGuilds: guild.exclude,

          excludeAnswered
        })
      });

      const data = await res.json();

      const questionText = document.getElementById("questionList");

      if (!data.length) {
        questionText.innerText = "No matching questions found.";
        currentQuestionId = null;
        return;
      }

      // Build selectable list
      questionText.innerHTML = data.map(q => `
        <div style="border:1px solid #5da9ff; padding:8px; margin-bottom:6px; border-radius:6px; cursor:pointer;"
            onclick="openQuestion(${q.id}, \`${q.question}\`)">
          ${q.question}
          ${q.answered ? '<span style="color:orange;"> (answered)</span>' : ''}
        </div>
      `).join("");
    }

    async function submitAnswer() {
      if (!currentQuestionId) {
        document.getElementById("resultText").innerText = "No question loaded.";
        return;
      }

      const answer = document.getElementById("answerInput").value;

      const res = await fetch("/answer-question", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, questionId: currentQuestionId, answer })
      });

      const data = await res.json();
      const resultText = document.getElementById("resultText");

      if (data.correct) {
        resultText.innerText = `Correct! +${data.xpGained} XP | Rank: ${data.rank}`;
        document.getElementById("answerInput").value = "";
        startQuestions();
      } else {
        resultText.innerText = data.message || "Wrong answer 😢";
      }
    }

    async function submitQuestion() {
      const question = document.getElementById("newQuestion").value;
      const answer = document.getElementById("newAnswer").value;
      const difficulty = document.getElementById("newDifficulty").value;
      const category = document.getElementById("newCategory").value;
      const res = await fetch("/add-question", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question, answer, difficulty, category, username })
      });
      const text = await res.text();
      document.getElementById("createResult").innerText = text;
      document.getElementById("newQuestion").value = "";
      document.getElementById("newAnswer").value = "";
      document.getElementById("newCategory").value = "";
    }

    function selectQuestion(id, text) {
      currentQuestionId = id;
      document.getElementById("questionText").innerText = text;
    }
        /* =========================================================================
       QUESTION LOGIC, 
       ========================================================================= */

    async function loadMyQuestions() {
      const res = await fetch(`/my-questions/${username}`);
      const data = await res.json();

      const container = document.getElementById("myQuestionsList");

      if (!data.length) {
        container.innerHTML = "<p>No questions created yet.</p>";
        return;
      }

      container.innerHTML = data.map(q => `
        <div style="border:1px solid #5da9ff; padding:10px; margin-bottom:10px; border-radius:8px;">
          <strong>${q.question}</strong><br>
          <small>Answer: ${q.answer}</small><br>
          <small>${q.category} | ${q.difficulty}</small><br><br>

          <button onclick="editQuestion(${q.id}, '${q.question}', '${q.answer}', '${q.category}', '${q.difficulty}')">✏️ Edit</button>
          <button onclick="deleteQuestion(${q.id})" style="color:red;">❌ Delete</button>
        </div>
      `).join("");
    }

    async function deleteQuestion(id) {
      if (!confirm("Delete this question?")) return;

      await fetch("/delete-question", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ questionId: id, username })
      });

      loadMyQuestions();
    }

    async function editQuestion(id, oldQ, oldA, oldC, oldD) {
      const question = prompt("Edit question:", oldQ);
      const answer = prompt("Edit answer:", oldA);

      if (!question || !answer) return;

      await fetch("/edit-question", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          questionId: id,
          username,
          question,
          answer,
          category: oldC,
          difficulty: oldD
        })
      });

      loadMyQuestions();
    }

    function openQuestion(id, text) {
      currentQuestionId = id;

      document.getElementById("singleQuestionText").innerText = text;
      document.getElementById("singleAnswerInput").value = "";
      document.getElementById("singleResultText").innerText = "";

      // switch views
      document.getElementById("questionsSection").style.display = "none";
      document.getElementById("answerSingleSection").style.display = "flex";
    }

    function backToSearch() {
      document.getElementById("answerSingleSection").style.display = "none";
      document.getElementById("questionsSection").style.display = "flex";
    }

    async function submitSingleAnswer() {
      if (!currentQuestionId) {
        document.getElementById("singleResultText").innerText = "No question selected.";
        return;
      }

      const answer = document.getElementById("singleAnswerInput").value;

      const res = await fetch("/answer-question", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, questionId: currentQuestionId, answer })
      });

      const data = await res.json();

      if (data.correct) {
        document.getElementById("singleResultText").innerText =
          `Correct! +${data.xpGained} XP | Rank: ${data.rank}`;
      } else {
        document.getElementById("singleResultText").innerText =
          data.message || "Wrong answer 😢";
      }
    }
    /* =========================================================================
       NETWORKING & LIFECYCLE
       ========================================================================= */
    async function sendHeartbeat() {
      await fetch("/heartbeat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, guild: getGuild(major), room: currentRoom })
      });
    }

    async function updateActiveUsers() {
      const res = await fetch(`/active-users/${currentRoom}`);
      const users = await res.json();
      document.getElementById("activeCount").innerText = users.length;
      const listDiv = document.getElementById("activeUsersList");
      if (listDiv) {
        listDiv.innerHTML = users.length > 0 ? users.map(u => `<div>🟢 ${u.username}</div>`).join("") : "No one online";
      }
    }

    // Interval Timers
    setInterval(() => { sendHeartbeat(); updateActiveUsers(); }, 10000);
    setInterval(loadMessages, 3000);

    // Initial Load
    sendHeartbeat();
    updateActiveUsers();
    loadMessages();
    updateChatTitle();

    // Event Listeners
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === 'hidden') {
        const data = JSON.stringify({ username });
        navigator.sendBeacon('/go-offline', new Blob([data], { type: 'application/json' }));
      } else if (document.visibilityState === 'visible') {
        sendHeartbeat();
        updateActiveUsers();
      }
    });

    document.addEventListener("click", (e) => {
      const menu = document.getElementById("roomMenu");
      const btn = document.querySelector(".chat-dropbtn");
      if (menu && btn && !menu.contains(e.target) && !btn.contains(e.target)) {
        menu.style.display = "none";
      }
    });

    document.getElementById("chatInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
