<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scrolls & Tomes - Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter&display=swap" rel="stylesheet">

<style>
html, body {
  height: 100%;
  margin: 0;
}

body {
  background-color: #0b0f1a;
  color: #e6ecff;
  font-family: 'Inter', sans-serif;
}

/* FULL HEIGHT */
.container-fluid, .row {
  height: 100%;
}

/* SIDEBAR */
.sidebar {
  height: 100%;
  background-color: #141a2e;
  padding: 20px;
  border-right: 1px solid #5da9ff;
  display: flex;
  flex-direction: column;
  transition: width 0.3s ease;
  width: 260px;
}

/* COLLAPSED */
.sidebar.collapsed {
  width: 80px;
  padding: 20px 10px;
}

.sidebar h2 {
  font-family: 'Cinzel', serif;
  color: #5da9ff;
  font-size: 20px;
  transition: opacity 0.2s;
}

.sidebar.collapsed h2 {
  opacity: 0;
}

/* NAV */
.nav-section {
  margin-top: 20px;
  flex-grow: 1;
}

.nav-btn {
  width: 100%;
  margin-bottom: 10px;
  background: none;
  border: 1px solid #5da9ff;
  color: #e6ecff;
  padding: 10px;
  transition: all 0.2s ease;
  white-space: nowrap;
}

.sidebar.collapsed .nav-btn {
  font-size: 0;
  padding: 12px;
}

.nav-btn:hover {
  background-color: #1f2a4a;
}

.nav-btn.active {
  background-color: #5da9ff;
  color: #0b0f1a;
  font-weight: bold;
}

/* DIVIDER ABOVE LOGOUT */
.divider {
  border-top: 1px solid rgba(93,169,255,0.3);
  margin: 10px 0;
}

/* TOP BAR (INVISIBLE) */
.topbar {
  height: 60px;
  background-color: #0b0f1a; /* same as body */
  border-bottom: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
}

/* TOGGLE BUTTON */
.toggle-btn {
  background: none;
  border: 1px solid #5da9ff;
  color: #5da9ff;
  padding: 5px 10px;
  cursor: pointer;
}

/* USER */
.user-info {
  display: flex;
  align-items: center;
  gap: 12px;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background-color: #5da9ff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  color: #0b0f1a;
}

.user-text {
  text-align: right;
}

.user-name {
  font-size: 14px;
  font-weight: bold;
}

.user-guild {
  font-size: 12px;
  opacity: 0.7;
}

/* MAIN */
.main {
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 0;
}

/* CONTENT */
.content {
  flex-grow: 1;
  padding: 20px;
  display: flex;
}

/* CARD */
.card-custom {
  background-color: #141a2e;
  border: 1px solid #5da9ff;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 0 15px rgba(93, 169, 255, 0.2);
  display: flex;
  flex-direction: column;
  flex-grow: 1;
}

/* TITLE */
.section-title {
  font-family: 'Cinzel', serif;
  font-size: 24px;
  color: #5da9ff;
  margin-bottom: 10px;
}

/* CHAT */
.chat-box {
  flex-grow: 1;
  overflow-y: auto;
  background-color: #0a0e1a;
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 15px;
}

/* INPUT */
.input-row {
  display: flex;
  gap: 10px;
}

.input-row input {
  flex: 1;
}

input, select {
  background-color: #1a2238 !important;
  color: #e6ecff !important;
  border: 1px solid #5da9ff !important;
}

/* BUTTONS */
.btn-primary {
  background-color: #5da9ff;
  border: none;
  color: #0b0f1a;
}

.btn-accent {
  background-color: #9b5cff;
  border: none;
}
</style>
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar">
      <h2>Scrolls & Tomes</h2>

      <div class="nav-section">
        <button class="nav-btn active" onclick="showSection('chat', this)">Guild Chat</button>
        <button class="nav-btn" onclick="showSection('questions', this)">Answer Questions</button>
        <button class="nav-btn" onclick="showSection('create', this)">Create Question</button>
        <button class="nav-btn" onclick="window.location.href='/leaderboard.html'">Leaderboard</button>
      </div>

      <div class="divider"></div>

      <button class="nav-btn" onclick="logout()">Logout</button>
    </div>

    <!-- MAIN -->
    <div class="col main">

      <!-- TOP BAR -->
      <div class="topbar">
        <button class="toggle-btn" onclick="toggleSidebar()">☰</button>

        <div class="user-info">
          <div class="user-text">
            <div class="user-name" id="usernameDisplay"></div>
            <div class="user-guild" id="guildDisplay"></div>
          </div>
          <div class="avatar" id="avatar"></div>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="content">

        <div id="chatSection" class="card-custom">
          <div class="section-title">Guild Chat</div>

          <div class="chat-box" id="chatBox">
            <p style="opacity:.6;">💬 Guild chat will appear here</p>
          </div>

          <div class="input-row">
            <input type="text" id="chatInput" class="form-control" placeholder="Type a message...">
            <button class="btn btn-primary" onclick="sendMessage()">Send</button>
          </div>
        </div>

        <div id="questionsSection" class="card-custom" style="display:none;">
          <div class="section-title">Answer Questions</div>

          <p id="questionText">Click to load a question</p>
          <input type="text" id="answerInput" class="form-control">

          <button class="btn btn-primary mt-2" onclick="startQuestions()">Load Question</button>
          <button class="btn btn-accent mt-2" onclick="submitAnswer()">Submit Answer</button>

          <p id="resultText"></p>
        </div>

        <div id="createSection" class="card-custom" style="display:none;">
          <div class="section-title">Create Question</div>

          <label style="margin-bottom:4px; opacity:0.8;">Question</label>
          <input type="text" id="newQuestion" class="form-control mb-2" placeholder="Enter the question">

          <label style="margin-bottom:4px; opacity:0.8;">Answer</label>
          <input type="text" id="newAnswer" class="form-control mb-2" placeholder="Enter the correct answer">

          <select id="newDifficulty" class="form-control mb-2">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>

          <select id="newCategory" class="form-control mb-2">
            <option value="math">Math</option>
            <option value="engineering">Engineering</option>
            <option value="business">Business</option>
            <option value="arts">Arts</option>
            <option value="medicine">Medicine</option>
          </select>

          <button class="btn btn-primary" onclick="submitQuestion()">Submit</button>

          <p id="createResult"></p>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
const username = localStorage.getItem("username");
const major = localStorage.getItem("major");

if (!username || !major) {
  window.location.href = "/login.html";
}

function getGuild(major) {
  if (major === "engineering") return "Mage Guild";
  if (major === "business") return "Merchant Guild";
  if (major === "arts") return "Artisan Guild";
  if (major === "medicine") return "Healer Guild";
  return "Unknown Guild";
}

/* HEADER UI */
document.getElementById("usernameDisplay").innerText = username;
document.getElementById("guildDisplay").innerText = getGuild(major);
document.getElementById("avatar").innerText = username.charAt(0).toUpperCase();

/* STATE */
let currentQuestionId = null;

/* SIDEBAR TOGGLE */
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("collapsed");
}

/* SECTION NAVIGATION */
function showSection(section, btn) {
  document.getElementById("chatSection").style.display = "none";
  document.getElementById("questionsSection").style.display = "none";
  document.getElementById("createSection").style.display = "none";

  document.getElementById(section + "Section").style.display = "flex";

  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");
}

/* LOGOUT */
function logout() {
  localStorage.clear();
  window.location.href = "/index.html";
}

/* CHAT (fixed: append instead of overwrite) */
function sendMessage() {
  const input = document.getElementById("chatInput");
  const chatBox = document.getElementById("chatBox");

  const message = input.value.trim();
  if (message === "") return;

  const msgEl = document.createElement("p");
  msgEl.innerHTML = `<strong>${username}:</strong> ${message}`;

  chatBox.appendChild(msgEl);
  chatBox.scrollTop = chatBox.scrollHeight;

  input.value = "";
}

/* LOAD QUESTION */
async function startQuestions() {
  const res = await fetch("/questions");
  const data = await res.json();

  const questionText = document.getElementById("questionText");

  if (!data || data.length === 0) {
    questionText.innerText = "No questions available";
    return;
  }

  const q = data[0]; // first question for now
  currentQuestionId = q.id;

  questionText.innerText = q.question;
}

/* SUBMIT ANSWER */
async function submitAnswer() {
  const answer = document.getElementById("answerInput").value;

  const res = await fetch("/answer-question", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      username,
      questionId: currentQuestionId,
      answer
    })
  });

  const data = await res.json();

  const resultText = document.getElementById("resultText");

  if (data.correct) {
    resultText.innerText =
      `Correct! +${data.xpGained} XP | Rank: ${data.rank}`;
  } else {
    resultText.innerText = "Wrong answer 😢";
  }
}

/* CREATE QUESTION */
async function submitQuestion() {
  const question = document.getElementById("newQuestion").value;
  const answer = document.getElementById("newAnswer").value;
  const difficulty = document.getElementById("newDifficulty").value;
  const category = document.getElementById("newCategory").value;

  const res = await fetch("/add-question", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      question,
      answer,
      difficulty,
      category
    })
  });

  const text = await res.text();

  document.getElementById("createResult").innerText = text;

  // clear inputs
  document.getElementById("newQuestion").value = "";
  document.getElementById("newAnswer").value = "";
  document.getElementById("newCategory").value = "";
}
</script>

</body>
</html>
